name: Issue Comment Router

# This workflow catches issue_comment events from any user (including external
# contributors with read-only access) and re-dispatches them as workflow_dispatch
# events. This makes the Claude agent run with repo-level permissions instead of
# the commenter's permissions, bypassing the actor permission check in claude-code-action.

on:
  issue_comment:
    types: [created]

permissions:
  actions: write

jobs:
  route:
    runs-on: ubuntu-latest
    # Skip: bot comments, PR comments
    if: |
      github.event.comment.user.type != 'Bot' &&
      github.event.issue.pull_request == null
    steps:
      - name: Trigger Claude agent
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run claude-code.yml \
            --repo "${{ github.repository }}" \
            --field issue_number=${{ github.event.issue.number }}
